# =============================================================================
# AI Assistant Docker Compose 配置
# 包含所有基础设施服务
# =============================================================================
version: '3.8'

services:
  # ===========================================================================
  # MySQL 8.0 数据库
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: ai-assistant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_assistant
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --max_allowed_packet=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Redis 7 缓存
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: ai-assistant-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Milvus 向量数据库 - etcd
  # ===========================================================================
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai-assistant-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
      TZ: Asia/Shanghai
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Milvus 向量数据库 - MinIO
  # ===========================================================================
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ai-assistant-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Milvus 向量数据库 - Standalone
  # ===========================================================================
  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: ai-assistant-milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      COMMON_GRACEFULSTOPTIMEOUT: '30'
      TZ: Asia/Shanghai
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_standalone_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Elasticsearch 8.12.0 搜索引擎
  # ===========================================================================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: ai-assistant-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai-assistant-network

  # ===========================================================================
  # Ollama 本地大模型服务（可选）
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-assistant-ollama
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-assistant-network

# =============================================================================
# 网络配置
# =============================================================================
networks:
  ai-assistant-network:
    driver: bridge
    name: ai-assistant-network

# =============================================================================
# 数据卷配置
# =============================================================================
volumes:
  mysql_data:
    name: ai-assistant-mysql-data
  redis_data:
    name: ai-assistant-redis-data
  milvus_etcd_data:
    name: ai-assistant-milvus-etcd-data
  milvus_minio_data:
    name: ai-assistant-milvus-minio-data
  milvus_standalone_data:
    name: ai-assistant-milvus-standalone-data
  elasticsearch_data:
    name: ai-assistant-elasticsearch-data
  ollama_data:
    name: ai-assistant-ollama-data
